spring.application.name=backend-pedidos

# Server
server.port=8002

# PostgreSQL (Ahora escucha a Docker, pero falla a local si Docker no está)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:shopcloud}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

# Comunicación con Microservicio 1
# OJO: Si MS1 también está en Docker, "localhost" fallará. Deberás inyectar la URL como variable de entorno.
ms1.url=${MS1_URL:http://localhost:8001}

# Seguridad
jwt.secret=${JWT_SECRET:un_secreto_muy_largo_y_seguro}

# JPA - Let Hibernate create tables from entities, then data.sql populates
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL seed - run after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs